# ============================================================================
# FinFlow — deploy (Coolify / produção).
#
# Por padrão roda com banco EM MEMÓRIA (InMemory): zero dependência, sobe em
# qualquer VPS, mas os dados RESETAM a cada restart/redeploy (ideal p/ demo).
#
# Para PERSISTIR os dados, descomente o serviço `sqlserver` abaixo e ajuste as
# variáveis (DATABASE_PROVIDER=SqlServer + CONNECTION_STRING). Exige ~2 GB RAM.
#
# No Coolify:
#   1. New Resource → Docker Compose → aponte para este repositório.
#   2. Porta exposta = 8080 (o app escuta em http://+:8080).
#   3. Defina as variáveis de ambiente (ver .env.example) nas Settings do app.
#   4. Coolify cuida do domínio + HTTPS (Traefik) — o app já trata X-Forwarded-*.
# ============================================================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      # InMemory (default) | SqlServer | Oracle
      Database__Provider: "${DATABASE_PROVIDER:-InMemory}"
      ConnectionStrings__Default: "${CONNECTION_STRING:-}"
      Jobs__Enabled: "true"
      # TROQUE este token no Coolify (Settings → Environment Variables).
      Bank__WebhookToken: "${BANK_WEBHOOK_TOKEN:-troque-este-token}"
    expose:
      - "8080"            # Coolify/Traefik conecta nesta porta interna
    volumes:
      - finflow_uploads:/app/uploads
      - finflow_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    # depends_on:           # descomente ao usar o sqlserver abaixo
    #   sqlserver:
    #     condition: service_healthy

  # ---- Persistência opcional (SQL Server) — descomente para dados permanentes ----
  # Lembre de setar no Coolify:
  #   DATABASE_PROVIDER=SqlServer
  #   CONNECTION_STRING=Server=sqlserver,1433;Database=FinFlow;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
  # sqlserver:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   restart: unless-stopped
  #   environment:
  #     ACCEPT_EULA: "Y"
  #     MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?defina uma senha forte no Coolify}"
  #   volumes:
  #     - finflow_mssql:/var/opt/mssql
  #   healthcheck:
  #     test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 20
  #     start_period: 60s

volumes:
  finflow_uploads:
  finflow_logs:
