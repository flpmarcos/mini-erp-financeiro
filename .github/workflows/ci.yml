# CI do sistema Contas a Pagar (.NET 8).
# OBS monorepo: o GitHub so dispara workflows do .github/ na RAIZ do repositorio.
# Se este projeto for uma subpasta, mova este arquivo para <raiz>/.github/workflows/
# e ajuste 'working-directory' / paths abaixo.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION: ContasAPagar.sln

defaults:
  run:
    working-directory: .   # ajuste para ./05-contas-a-pagar-net8 em monorepo

jobs:
  build-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore $SOLUTION
      - name: Build
        run: dotnet build $SOLUTION -c Release --no-restore
      - name: Unit tests
        run: dotnet test tests/AccountsPayable.Tests.Unit -c Release --no-build --logger "trx" --results-directory TestResults
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults

  integration:
    runs-on: ubuntu-latest   # runner ubuntu ja tem Docker (Testcontainers/Oracle)
    needs: build-and-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Integration tests (Testcontainers Oracle)
        run: dotnet test tests/AccountsPayable.Tests.Integration -c Release --logger "trx" --results-directory TestResults
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: TestResults

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Publish app
        run: dotnet build src/ContasAPagar.Web -c Release
      - name: Install Playwright browsers
        run: |
          dotnet build tests/AccountsPayable.Tests.E2E -c Release
          pwsh tests/AccountsPayable.Tests.E2E/bin/Release/net8.0/playwright.ps1 install --with-deps chromium
      - name: Start app (InMemory) and run E2E
        run: |
          ASPNETCORE_URLS=http://localhost:5080 dotnet run --project src/ContasAPagar.Web -c Release --no-build &
          npx --yes wait-on http://localhost:5080/health || sleep 20
          E2E_BASE_URL=http://localhost:5080 dotnet test tests/AccountsPayable.Tests.E2E -c Release --no-build
